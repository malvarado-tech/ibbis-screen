services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - IBBIS_MOCK_MODE=false
      - IBBIS_COMMEC_DB_DIR=/opt/commec/databases
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_DEMO_MODE: "false"
    ports:
      - "3000:3000"
    depends_on:
      - backend
